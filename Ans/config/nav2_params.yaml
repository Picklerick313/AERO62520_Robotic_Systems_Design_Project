map_server:
  ros__parameters:
    yaml_filename: "/home/<youruser>/AERO.../Ans/data/maps/leo_map.yaml"

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]

controller_server:
  ros__parameters:
    controller_plugins: ["FollowPath"]

global_costmap:
  global_costmap:
    ros__parameters:
      global_frame: "map"
      robot_base_frame: "base_link"

local_costmap:
  local_costmap:
    ros__parameters:
      global_frame: "odom"
      robot_base_frame: "base_link"

